services:
  db:
    image: postgres:16-alpine
    container_name: nova_otica_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nova_otica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova_otica}
      POSTGRES_DB: ${POSTGRES_DB:-nova_otica}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nova_otica_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nova_otica}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nova_otica_pgdata:
